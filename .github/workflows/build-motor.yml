name: GnuChan Editor

on:
  push:
    branches: [ main, master, 'release/**' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  BUILD_DIR: ${{ github.workspace }}/build
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 2G
  CCACHE_COMPRESS: 1
  CMAKE_BUILD_TYPE: Release

jobs:
  build-linux:
    name: Linux
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: 'false'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential cmake ninja-build ccache pkg-config \
            python3-dev python3-numpy \
            libx11-dev libxxf86vm-dev libxcursor-dev libxi-dev \
            libxrandr-dev libxinerama-dev libglew-dev \
            libgl1-mesa-dev libglu1-mesa-dev \
            libsdl2-dev libopenal-dev \
            libjpeg-dev libpng-dev libtiff-dev libfreetype6-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
            libsamplerate-dev libjack-dev libfftw3-dev \
            libboost-dev libboost-thread-dev libboost-filesystem-dev \
            libboost-regex-dev libboost-system-dev libboost-locale-dev \
            libboost-wave-dev libtbb-dev \
            libxml2-dev libtinyxml-dev libyaml-cpp-dev libjemalloc-dev \
            libopenexr-dev libopenjp2-7-dev \
            zlib1g-dev liblzma-dev libssl-dev

      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-gnuchan-${{ github.sha }}
          restore-keys: ${{ runner.os }}-gnuchan-
          max-size: 2G

      - name: Configure
        run: |
          mkdir -p "$BUILD_DIR"
          cmake -S "${{ github.workspace }}/src" -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=$CMAKE_BUILD_TYPE \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DPYTHON_VERSION=3.10 \
            -DWITH_BLENDER=ON \
            -DWITH_PLAYER=ON \
            -DWITH_GAMEENGINE=ON \
            -DWITH_CYCLES=OFF \
            -DWITH_CYCLES_OSL=OFF \
            -DWITH_OPENCOLORIO=ON \
            -DWITH_OPENCOLLADA=OFF \
            -DWITH_CODEC_FFMPEG=ON \
            -DWITH_SDL=ON \
            -DWITH_OPENAL=ON \
            -DWITH_JACK=OFF \
            -DWITH_INTERNATIONAL=OFF \
            -DWITH_PYTHON_INSTALL=OFF \
            -DWITH_FFTW3=ON \
            -DWITH_MOD_OCEANSIM=ON \
            -DWITH_RAYOPTIMIZATION=ON \
            -DWITH_OPENMP=ON \
            -DWITH_BUILDINFO=OFF \
            -DWITH_BULLET=ON \
            -DWITH_FREESTYLE=ON \
            -DWITH_IMAGE_OPENEXR=ON \
            -DWITH_IMAGE_TIFF=ON \
            -DWITH_IMAGE_DDS=ON \
            -DWITH_LIBMV=ON \
            -DWITH_AUDASPACE=ON \
            -DWITH_SYSTEM_GLEW=ON \
            -DWITH_LINKER_GOLD=ON \
            -DWITH_TBB=ON \
            -DWITH_MEM_JEMALLOC=ON

      - name: Build
        run: cmake --build "$BUILD_DIR" -j $(nproc)

      - uses: actions/upload-artifact@v4
        with:
          name: gnuchan-editor-linux
          path: $BUILD_DIR/bin/
          retention-days: 7
          if-no-files-found: ignore

  build-windows:
    name: Windows
    runs-on: windows-2022
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: 'false'

      - uses: microsoft/setup-msbuild@v2

      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-gnuchan-win-${{ github.sha }}
          restore-keys: ${{ runner.os }}-gnuchan-win-
          max-size: 2G

      - name: Cache precompiled libs
        id: cache-libs
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/lib/win64_vc15
          key: win64-vc15-libs-v2
          restore-keys: win64-vc15-libs-

      - name: Install SVN
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: choco install svn -y --no-progress

      - name: Download precompiled libs (win64_vc15)
        if: steps.cache-libs.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          mkdir "%GITHUB_WORKSPACE%\lib"
          cd "%GITHUB_WORKSPACE%\lib"
          svn checkout --depth=empty https://svn.blender.org/svnroot/bf-blender/trunk/lib/win64_vc15 win64_vc15
          cd win64_vc15
          for %%d in (alembic boost fftw3 freetype imath jack jpeg openal opencollada opencolorio openexr openimageio openjpeg opensubdiv openvdb osl png pthreads python sdl tbb tiff webp zlib) do (
            svn update --set-depth=infinity %%d
          )

      - name: Configure
        shell: cmd
        run: |
          mkdir "%BUILD_DIR%"
          cmake -S "%GITHUB_WORKSPACE%\src" -B "%BUILD_DIR%" ^
            -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DWITH_BLENDER=ON ^
            -DWITH_PLAYER=ON ^
            -DWITH_GAMEENGINE=ON ^
            -DWITH_CYCLES=OFF ^
            -DWITH_CYCLES_OSL=OFF ^
            -DWITH_OPENCOLORIO=ON ^
            -DWITH_OPENCOLLADA=OFF ^
            -DWITH_CODEC_FFMPEG=ON ^
            -DWITH_SDL=ON ^
            -DWITH_OPENAL=ON ^
            -DWITH_INTERNATIONAL=OFF ^
            -DWITH_PYTHON_INSTALL=OFF ^
            -DWITH_RAYOPTIMIZATION=ON ^
            -DWITH_OPENMP=ON ^
            -DWITH_BUILDINFO=OFF ^
            -DWITH_BULLET=ON ^
            -DWITH_FREESTYLE=ON ^
            -DWITH_IMAGE_OPENEXR=ON ^
            -DWITH_IMAGE_TIFF=ON ^
            -DWITH_LIBMV=ON ^
            -DWITH_AUDASPACE=ON ^
            -DWITH_TBB=ON
        env:
          BUILD_DIR: ${{ github.workspace }}\build

      - name: Build
        shell: cmd
        run: cmake --build "%BUILD_DIR%" --config Release -j %NUMBER_OF_PROCESSORS%
        env:
          BUILD_DIR: ${{ github.workspace }}\build

      - uses: actions/upload-artifact@v4
        with:
          name: gnuchan-editor-windows
          path: ${{ github.workspace }}\build\bin\Release\
          retention-days: 7
          if-no-files-found: ignore
