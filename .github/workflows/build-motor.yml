name: GnuChan Editor

on:
  push:
    branches: [ main, master, 'release/**' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  BUILD_DIR: ${{ github.workspace }}/build
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 2G
  CCACHE_COMPRESS: 1
  CMAKE_BUILD_TYPE: Release

jobs:
  build-linux:
    name: Linux
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: 'false'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential cmake ninja-build ccache pkg-config \
            python3-dev python3-numpy \
            libx11-dev libxxf86vm-dev libxcursor-dev libxi-dev \
            libxrandr-dev libxinerama-dev libglew-dev \
            libgl1-mesa-dev libglu1-mesa-dev \
            libsdl2-dev libopenal-dev \
            libjpeg-dev libpng-dev libtiff-dev libfreetype6-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
            libavdevice-dev libavfilter-dev \
            libsamplerate-dev libjack-dev libfftw3-dev \
            libboost-dev libboost-thread-dev libboost-filesystem-dev \
            libboost-regex-dev libboost-system-dev libboost-locale-dev \
            libboost-wave-dev libtbb-dev \
            libxml2-dev libtinyxml-dev libyaml-cpp-dev libjemalloc-dev \
            libopenexr-dev libopenjp2-7-dev \
            zlib1g-dev liblzma-dev libssl-dev

      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-gnuchan-${{ github.sha }}
          restore-keys: ${{ runner.os }}-gnuchan-
          max-size: 2G

      - name: Configure
        run: |
          mkdir -p "$BUILD_DIR"
          cmake -S "${{ github.workspace }}/src" -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=$CMAKE_BUILD_TYPE \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DPYTHON_VERSION=3.10 \
            -DWITH_BLENDER=ON \
            -DWITH_PLAYER=ON \
            -DWITH_GAMEENGINE=ON \
            -DWITH_CYCLES=OFF \
            -DWITH_CYCLES_OSL=OFF \
            -DWITH_OPENCOLORIO=ON \
            -DWITH_OPENCOLLADA=OFF \
            -DWITH_CODEC_FFMPEG=ON \
            -DWITH_SDL=ON \
            -DWITH_OPENAL=ON \
            -DWITH_JACK=OFF \
            -DWITH_INTERNATIONAL=OFF \
            -DWITH_PYTHON_INSTALL=OFF \
            -DWITH_FFTW3=ON \
            -DWITH_MOD_OCEANSIM=ON \
            -DWITH_RAYOPTIMIZATION=ON \
            -DWITH_OPENMP=ON \
            -DWITH_BUILDINFO=OFF \
            -DWITH_BULLET=ON \
            -DWITH_FREESTYLE=ON \
            -DWITH_IMAGE_OPENEXR=ON \
            -DWITH_IMAGE_TIFF=ON \
            -DWITH_IMAGE_DDS=ON \
            -DWITH_LIBMV=ON \
            -DWITH_AUDASPACE=ON \
            -DWITH_SYSTEM_GLEW=ON \
            -DWITH_LINKER_GOLD=ON \
            -DWITH_TBB=ON \
            -DWITH_MEM_JEMALLOC=ON

      - name: Build
        id: build
        continue-on-error: true
        run: cmake --build "$BUILD_DIR" -j $(nproc) 2>&1 | tee "$BUILD_DIR/build_log.txt"

      - name: Extract errors and save report
        if: always()
        run: |
          LOG="$BUILD_DIR/build_log.txt"
          ERRORS="$GITHUB_WORKSPACE/gnuchan_build_errors.txt"
          if [ -f "$LOG" ]; then
            cp "$LOG" "$GITHUB_WORKSPACE/build_full_log.txt"
            grep -in "error" "$LOG" > "$ERRORS" 2>/dev/null || true
            if [ -s "$ERRORS" ]; then
              COUNT=$(wc -l < "$ERRORS")
              {
                echo "========================================"
                echo "  GNUCHAN EDITOR BUILD ERROR REPORT"
                echo "========================================"
                echo ""
                echo "OS: ubuntu-22.04"
                echo "Date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
                echo "Workflow: $GITHUB_WORKFLOW"
                echo "Run ID: $GITHUB_RUN_ID"
                echo ""
                echo "Total error lines: $COUNT"
                echo ""
                echo "========================================"
                echo "  ERRORS"
                echo "========================================"
                cat "$ERRORS"
              } > "${ERRORS}.tmp" && mv "${ERRORS}.tmp" "$ERRORS"
              echo "::warning::Build errors detected - $COUNT lines saved to gnuchan_build_errors.txt"
            fi
          fi

      - name: Fail if build failed
        if: steps.build.outcome == 'failure'
        run: |
          echo "::error::Build failed. Check 'build-logs-linux' artifact for the error report."
          exit 1

      - name: Upload build logs (error report + full log)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-linux
          path: |
            gnuchan_build_errors.txt
            build_full_log.txt
          retention-days: 30
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        with:
          name: gnuchan-editor-linux
          path: $BUILD_DIR/bin/
          retention-days: 7
          if-no-files-found: ignore

  build-windows:
    name: Windows
    runs-on: windows-2022
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: 'false'

      - uses: microsoft/setup-msbuild@v2

      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-gnuchan-win-${{ github.sha }}
          restore-keys: ${{ runner.os }}-gnuchan-win-
          max-size: 2G

      - name: Install SVN
        run: choco install svn -y --no-progress

      - name: Download precompiled libs (win64_vc15)
        id: svn_checkout
        continue-on-error: true
        shell: pwsh
        run: |
          # Enable long paths on Windows (avoid MAX_PATH issues with SVN deep trees)
          try {
            New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
              -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force | Out-Null
            Write-Host "Enabled Windows long path support"
          } catch {
            Write-Warning "Could not enable long paths (non-admin?): $_"
          }

          $libDir = "$env:GITHUB_WORKSPACE\lib\win64_vc15"
          $svnUrl = "https://svn.blender.org/svnroot/bf-blender/trunk/lib/win64_vc15"

          # Start fresh
          if (Test-Path "$libDir") { Remove-Item -Recurse -Force "$libDir" -ErrorAction SilentlyContinue }
          New-Item -ItemType Directory -Force -Path "$libDir" | Out-Null

          # SVN global config: long timeout, compression off to avoid transfer issues
          $svnCfg = @(
            '--non-interactive',
            '--config-option', 'servers:global:http-timeout=1800',
            '--config-option', 'servers:global:http-compression=no',
            '--config-option', 'servers:global:http-bulk-updates=yes'
          )

          # Verified directory list from the SVN server (excluding files like dir.txt/dir.srt)
          $allDirs = @("Fribidi","MaterialX","OpenImageIO","alembic","blosc","boost","brotli","dpcpp","embree","epoxy","ffmpeg","fftw3","freetype","gmp","harfbuzz","haru","iconv","imath","jpeg","level-zero","llvm","openal","opencollada","opencolorio","openexr","opengl","openimagedenoise","openjpeg","openpgl","opensubdiv","openvdb","osl","package","png","potrace","pthreads","pugixml","pystring","python","sdl","shaderc","sndfile","tbb","tiff","usd","vulkan","webp","wintab","xml2","xr_openxr_sdk","zlib","zstd")
          $largeDirs = @("boost","python")

          function Invoke-SvnCheckout {
            param(
              [string]$dir,
              [int]$maxAttempts = 10,
              [int]$baseDelay = 10
            )
            $target = "$libDir\$dir"
            $attempts = $maxAttempts
            $delay = $baseDelay
            $url = "$svnUrl/$dir"

            do {
              if (Test-Path $target) {
                Remove-Item -Recurse -Force $target -ErrorAction SilentlyContinue
              }

              Write-Host "--- SVN checkout $dir (attempt $($maxAttempts - $attempts + 1)/$maxAttempts) ---"
              $result = & svn checkout @svnCfg --depth=infinity $url $target 2>&1
              $exitCode = $LASTEXITCODE
              $attempts--

              if ($exitCode -eq 0) {
                if (Test-Path $target) {
                  $itemCount = (Get-ChildItem -Path $target -Recurse -File -ErrorAction SilentlyContinue | Measure-Object).Count
                  Write-Host "SVN checkout $dir succeeded -- $itemCount files"
                  return $true
                }
                Write-Warning "SVN checkout $dir reported success but directory is empty"
                $exitCode = 1
              }

              $errorMsg = $result -join ' '
              $svnErrorMatch = [regex]::Match($errorMsg, 'svn:\s+E(\d{6})')

              if ($svnErrorMatch.Success) {
                $svnCode = $svnErrorMatch.Groups[1].Value
                Write-Warning "SVN $dir error: E$svnCode"
                # Permanent errors: URL doesn't exist, forbidden, etc.
                if ($svnCode -in @('170000', '175002', '155010')) {
                  Write-Warning "SVN ${dir}: permanent error E${svnCode} -- skipping"
                  return $false
                }
              } else {
                Write-Warning "SVN checkout $dir failed: exit code $exitCode"
              }

              if ($attempts -ge 0) {
                $jitter = Get-Random -Minimum 0 -Maximum 30
                $sleepTime = [Math]::Min($delay + $jitter, 300)
                Write-Host "Waiting $sleepTime seconds before retry..."
                Start-Sleep -Seconds $sleepTime
                $delay = [Math]::Min($delay * 2, 300)
              }
            } while ($attempts -ge 0)

            return $false
          }

          $failed = @()
          foreach ($d in $allDirs) {
            $isLarge = $d -in $largeDirs
            $maxRetries = if ($isLarge) { 30 } else { 10 }
            $baseDelay = if ($isLarge) { 60 } else { 10 }

            Write-Host "===== Checking out $d ($(if ($isLarge) {'large'} else {'small'}) directory) ====="
            if (-not (Invoke-SvnCheckout $d $maxRetries $baseDelay)) {
              $failed += $d
              Write-Error "SVN checkout failed for: $d"
            }
            Start-Sleep -Seconds $(if ($isLarge) {10} else {3})
          }

          if ($failed.Count -gt 0) {
            Write-Error "SVN failed for directories: $($failed -join ', ')"
            exit 1
          }

          # Verify critical files exist — use wildcard/glob for versioned paths
          $testFiles = @(
            "$libDir\boost\include\boost\version.hpp",
            "$libDir\ffmpeg\include\libavformat\avformat.h",
            "$libDir\python\311\include\Python.h"
          )
          # openjpeg version dir varies; search for it
          $openjpegTest = Get-ChildItem -Path "$libDir\openjpeg\include" -Recurse -Filter "openjpeg.h" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $openjpegTest) {
            Write-Error "Missing openjpeg.h -- SVN checkout appears incomplete"
            exit 1
          }
          Write-Host "Found openjpeg.h at $($openjpegTest.FullName)"

          foreach ($f in $testFiles) {
            if (-not (Test-Path $f)) {
              Write-Error "Missing critical file: $f -- SVN checkout appears incomplete"
              exit 1
            }
          }

      - name: Configure
        shell: cmd
        run: |
          mkdir "%BUILD_DIR%"
          cmake -S "%GITHUB_WORKSPACE%\src" -B "%BUILD_DIR%" ^
            -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DWITH_BLENDER=ON ^
            -DWITH_PLAYER=ON ^
            -DWITH_GAMEENGINE=ON ^
            -DWITH_CYCLES=OFF ^
            -DWITH_CYCLES_OSL=OFF ^
            -DWITH_OPENCOLORIO=ON ^
            -DWITH_OPENCOLLADA=OFF ^
            -DWITH_CODEC_FFMPEG=ON ^
            -DWITH_SDL=ON ^
            -DWITH_OPENAL=ON ^
            -DWITH_INTERNATIONAL=OFF ^
            -DWITH_PYTHON_INSTALL=OFF ^
            -DWITH_RAYOPTIMIZATION=ON ^
            -DWITH_OPENMP=ON ^
            -DWITH_BUILDINFO=OFF ^
            -DWITH_BULLET=ON ^
            -DWITH_FREESTYLE=ON ^
            -DWITH_IMAGE_OPENEXR=ON ^
            -DWITH_IMAGE_TIFF=ON ^
            -DWITH_LIBMV=ON ^
            -DWITH_AUDASPACE=ON ^
            -DWITH_TBB=ON
        env:
          BUILD_DIR: ${{ github.workspace }}\build

      - name: Build
        id: build_windows
        continue-on-error: true
        shell: cmd
        run: cmake --build "%BUILD_DIR%" --config Release -j %NUMBER_OF_PROCESSORS% > "%BUILD_DIR%\build_log.txt" 2>&1
        env:
          BUILD_DIR: ${{ github.workspace }}\build

      - name: Extract errors and save report
        if: always()
        shell: pwsh
        run: |
          $logPath = "$env:BUILD_DIR\build_log.txt"
          if (!(Test-Path $logPath)) { Write-Host "No build log found"; exit 0 }

          Copy-Item $logPath "$env:GITHUB_WORKSPACE\build_full_log.txt"

          $errors = Get-Content $logPath | Select-String -Pattern "error [A-Z]\d{4}|error C\d{4}|error LNK\d{4}|fatal error|Process completed" | Select-Object -ExpandProperty Line
          if ($errors) {
            $count = ($errors | Measure-Object).Count
            $report = @"
  GNUCHAN EDITOR BUILD ERROR REPORT

OS: windows-2022
Date: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')
Workflow: $env:GITHUB_WORKFLOW
Run ID: $env:GITHUB_RUN_ID

Total error lines: $count

  ERRORS

"@
            $report | Out-File "$env:GITHUB_WORKSPACE\gnuchan_build_errors.txt" -Encoding utf8
            $errors | Out-File "$env:GITHUB_WORKSPACE\gnuchan_build_errors.txt" -Encoding utf8 -Append
            Write-Host "Saved $count error line(s) to gnuchan_build_errors.txt"
            Write-Host "::warning::Build errors detected - $count lines. See 'build-logs-windows' artifact."
          } else {
            Write-Host "No build errors found in log"
          }

      - name: Fail if build failed
        if: steps.build_windows.outcome == 'failure'
        shell: pwsh
        run: |
          Write-Host "::error::Build failed. Check 'build-logs-windows' artifact for the error report."
          exit 1

      - name: Upload build logs (error report + full log)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-windows
          path: |
            gnuchan_build_errors.txt
            build_full_log.txt
          retention-days: 30
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        with:
          name: gnuchan-editor-windows
          path: ${{ github.workspace }}\build\bin\Release\
          retention-days: 7
          if-no-files-found: ignore
