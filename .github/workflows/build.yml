name: GnuChan Editor CI/CD

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  SOURCE_DIR: ${{ github.workspace }}/Editor
  BUILD_DIR: ${{ github.workspace }}/build
  INSTALL_DIR: ${{ github.workspace }}/install

jobs:
  build-linux:
    name: "Linux (GCC)"
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq --no-install-recommends \
            build-essential \
            cmake \
            git \
            python3-dev \
            python3-pip \
            python3-numpy \
            python3-requests \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libfreetype-dev \
            libjpeg-dev \
            libpng-dev \
            zlib1g-dev \
            libopenal-dev \
            libsndfile1-dev \
            libboost-dev \
            libboost-system-dev \
            libboost-filesystem-dev \
            libboost-thread-dev \
            libboost-regex-dev \
            libboost-locale-dev

      - name: Configure CMake
        run: |
          mkdir -p ${{ env.BUILD_DIR }}
          cd ${{ env.BUILD_DIR }}
          cmake ${{ env.SOURCE_DIR }} \
            -DPYTHON_VERSION=3.10 \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_INSTALL_PREFIX=${{ env.INSTALL_DIR }} \
            -DWITH_PLAYER=OFF \
            -DWITH_SYSTEM_GLEW=ON \
            -DWITH_IMAGE_OPENEXR=OFF \
            -DWITH_CODEC_FFMPEG=OFF \
            -DWITH_OPENCOLLADA=OFF \
            -DWITH_ALEMBIC=OFF \
            -DWITH_JACK=OFF \
            -DWITH_SDL=OFF \
            -DWITH_FFTW3=OFF \
            -DWITH_MOD_OCEANSIM=OFF \
            -DWITH_CYCLES_OSL=OFF \
            -DWITH_LLVM=OFF \
            -DWITH_OPENVDB=OFF \
            -DWITH_OPENCOLORIO=OFF \
            -DWITH_OPENSUBDIV=OFF \
            -DWITH_INTERNATIONAL=OFF

      - name: Build
        run: |
          cd ${{ env.BUILD_DIR }}
          cmake --build . --config ${{ env.BUILD_TYPE }} --parallel $(nproc)

      - name: Install
        run: |
          cd ${{ env.BUILD_DIR }}
          cmake --install . --config ${{ env.BUILD_TYPE }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gnuchaneditor-linux-x64
          path: ${{ env.INSTALL_DIR }}
          retention-days: 15

  create-release:
    name: "Create Release"
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: gnuchaneditor-linux-x64
          path: release/linux

      - name: Package Linux
        run: |
          cd release/linux
          tar -czf ../gnuchaneditor-${{ github.ref_name }}-linux-x64.tar.gz *

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "GnuChan Editor ${{ github.ref_name }}"
          body: |
            ## GnuChan Editor ${{ github.ref_name }}

            Based on Blender 2.79 source code, rebranded and maintained by GnuChanOS.

            ### Downloads
            - **Linux**: `gnuchaneditor-${{ github.ref_name }}-linux-x64.tar.gz`
          files: |
            release/gnuchaneditor-${{ github.ref_name }}-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
