name: GnuChan Editor CI/CD

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  SOURCE_DIR: ${{ github.workspace }}/Editor
  BUILD_DIR: ${{ github.workspace }}/build
  INSTALL_DIR: ${{ github.workspace }}/install

jobs:
  # ──────────────────────────────────────────
  # Build on Windows (MSVC 2022)
  # ──────────────────────────────────────────
  build-windows:
    name: "Windows (MSVC 2022)"
    runs-on: windows-2022
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy requests

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Configure CMake
        run: |
          if (-not (Test-Path "${{ env.BUILD_DIR }}")) { New-Item -ItemType Directory -Path "${{ env.BUILD_DIR }}" }
          cd ${{ env.BUILD_DIR }}
          cmake ${{ env.SOURCE_DIR }} `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_INSTALL_PREFIX=${{ env.INSTALL_DIR }} `
            -DWITH_PLAYER=OFF `
            -DWITH_CYCLES=ON `
            -DWITH_OPENCOLORIO=OFF `
            -DWITH_OPENSUBDIV=OFF `
            -DWITH_CODEC_FFMPEG=OFF `
            -DWITH_OPENCOLLADA=OFF `
            -DWITH_ALEMBIC=OFF `
            -DWITH_JACK=OFF `
            -DWITH_SDL=OFF `
            -DWITH_FFTW3=OFF `
            -DWITH_MOD_OCEANSIM=OFF `
            -DWITH_CYCLES_OSL=OFF `
            -DWITH_LLVM=OFF `
            -DWITH_OPENVDB=OFF

      - name: Build
        run: |
          cd ${{ env.BUILD_DIR }}
          cmake --build . --config ${{ env.BUILD_TYPE }} --parallel $env:NUMBER_OF_PROCESSORS

      - name: Install
        run: |
          cd ${{ env.BUILD_DIR }}
          cmake --install . --config ${{ env.BUILD_TYPE }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gnuchaneditor-windows-x64
          path: ${{ env.INSTALL_DIR }}
          retention-days: 15

  # ──────────────────────────────────────────
  # Build on Linux (GCC, Ubuntu 22.04)
  # ──────────────────────────────────────────
  build-linux:
    name: "Linux (GCC)"
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq --no-install-recommends \
            build-essential \
            cmake \
            git \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libfreetype-dev \
            libjpeg-dev \
            libpng-dev \
            zlib1g-dev \
            libopenal-dev \
            libsndfile1-dev \
            libboost-dev \
            libboost-system-dev \
            libboost-filesystem-dev \
            libboost-thread-dev \
            libboost-regex-dev \
            libboost-locale-dev \
            python3-dev

      - name: Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy requests

      - name: Configure CMake
        run: |
          mkdir -p ${{ env.BUILD_DIR }}
          cd ${{ env.BUILD_DIR }}
          cmake ${{ env.SOURCE_DIR }} \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_INSTALL_PREFIX=${{ env.INSTALL_DIR }} \
            -DWITH_PLAYER=OFF \
            -DWITH_SYSTEM_GLEW=ON \
            -DWITH_CODEC_FFMPEG=OFF \
            -DWITH_OPENCOLLADA=OFF \
            -DWITH_ALEMBIC=OFF \
            -DWITH_JACK=OFF \
            -DWITH_SDL=OFF \
            -DWITH_FFTW3=OFF \
            -DWITH_MOD_OCEANSIM=OFF \
            -DWITH_CYCLES_OSL=OFF \
            -DWITH_LLVM=OFF \
            -DWITH_OPENVDB=OFF \
            -DWITH_OPENCOLORIO=OFF \
            -DWITH_OPENSUBDIV=OFF

      - name: Build
        run: |
          cd ${{ env.BUILD_DIR }}
          cmake --build . --config ${{ env.BUILD_TYPE }} --parallel $(nproc)

      - name: Install
        run: |
          cd ${{ env.BUILD_DIR }}
          cmake --install . --config ${{ env.BUILD_TYPE }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gnuchaneditor-linux-x64
          path: ${{ env.INSTALL_DIR }}
          retention-days: 15

  # ──────────────────────────────────────────
  # Release (only on version tags)
  # ──────────────────────────────────────────
  create-release:
    name: "Create Release"
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: gnuchaneditor-windows-x64
          path: release/windows

      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: gnuchaneditor-linux-x64
          path: release/linux

      - name: Package Windows
        run: |
          cd release/windows
          7z a -tzip ../gnuchaneditor-${{ github.ref_name }}-windows-x64.zip *

      - name: Package Linux
        run: |
          cd release/linux
          tar -czf ../gnuchaneditor-${{ github.ref_name }}-linux-x64.tar.gz *

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "GnuChan Editor ${{ github.ref_name }}"
          body: |
            ## GnuChan Editor ${{ github.ref_name }}

            Based on Blender 2.79 source code, rebranded and maintained by GnuChanOS.

            ### Downloads
            - **Windows**: `gnuchaneditor-${{ github.ref_name }}-windows-x64.zip`
            - **Linux**: `gnuchaneditor-${{ github.ref_name }}-linux-x64.tar.gz`

            ### Changes
            - Full rebrand from Blender to GnuChan Editor
            - Version 1.0
            - Copyright: GnuChanOS
          files: |
            release/gnuchaneditor-${{ github.ref_name }}-windows-x64.zip
            release/gnuchaneditor-${{ github.ref_name }}-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
