name: GnuChan Editor CI/CD


on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Linux (GCC)
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq --no-install-recommends \
            build-essential cmake git \
            python3-dev python3-pip python3-numpy python3-requests \
            libx11-dev libxi-dev libxrandr-dev libxinerama-dev libxcursor-dev \
            libgl1-mesa-dev libglu1-mesa-dev \
            libfreetype-dev libjpeg-dev libpng-dev zlib1g-dev \
            libopenal-dev libsndfile1-dev \
            libboost-dev libboost-system-dev libboost-filesystem-dev \
            libboost-thread-dev libboost-regex-dev libboost-locale-dev

      - name: Configure
        run: |
          mkdir -p build && cd build
          cmake ../Editor -DPYTHON_VERSION=3.10 -DCMAKE_BUILD_TYPE=Release -DWITH_PLAYER=OFF -DWITH_SYSTEM_GLEW=OFF -DWITH_CYCLES=OFF -DWITH_IMAGE_OPENEXR=OFF -DWITH_CODEC_FFMPEG=OFF -DWITH_OPENCOLLADA=OFF -DWITH_ALEMBIC=OFF -DWITH_JACK=OFF -DWITH_SDL=OFF -DWITH_FFTW3=OFF -DWITH_IK_ITASC=OFF -DWITH_MOD_FLUID=OFF -DWITH_MOD_OCEANSIM=OFF -DWITH_CYCLES_OSL=OFF -DWITH_LLVM=OFF -DWITH_OPENVDB=OFF -DWITH_OPENCOLORIO=OFF -DWITH_OPENSUBDIV=OFF -DWITH_INTERNATIONAL=OFF

      - name: Build
        run: cd build && cmake --build . --parallel $(nproc)

      - name: Install
        run: cd build && cmake --install . --prefix install

      - name: Package
        run: cd install && tar -czf ../gnuchaneditor-linux-x64.tar.gz *

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: gnuchaneditor-linux-x64
          path: gnuchaneditor-linux-x64.tar.gz
          retention-days: 15

  build-windows:
    name: Windows (MSVC 2022)
    runs-on: windows-2022
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - uses: microsoft/setup-msbuild@v2

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/installed
            C:/vcpkg/buildtrees
          key: vcpkg-win64-${{ hashFiles('.github/workflows/build.yml') }}-v4

      - name: Setup vcpkg
        run: |
          if (-not (Test-Path "C:\vcpkg")) { git clone --depth=1 https://github.com/Microsoft/vcpkg.git C:\vcpkg ; C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics }
          C:\vcpkg\vcpkg.exe install --triplet x64-windows zlib libpng libjpeg-turbo freetype glew pthreads openal-soft python3
        shell: pwsh

      - name: Create lib structure
        shell: cmd
        run: |
          set VCPKG=C:\vcpkg\installed\x64-windows
          set LIB=%GITHUB_WORKSPACE%\lib\win64_vc15
          for %%p in (zlib png jpeg freetype pthreads openal python boost glew) do (
            mkdir "%LIB%\%%p\include" 2>nul
            mkdir "%LIB%\%%p\lib" 2>nul
            mklink /J "%LIB%\%%p\include" "%VCPKG%\include" 2>nul
            mklink /J "%LIB%\%%p\lib" "%VCPKG%\lib" 2>nul
          )
          copy /Y "%VCPKG%\lib\zlib.lib" "%VCPKG%\lib\libz_st.lib"
          copy /Y "%VCPKG%\lib\libpng16.lib" "%VCPKG%\lib\libpng.lib"
          copy /Y "%VCPKG%\lib\jpeg.lib" "%VCPKG%\lib\libjpeg.lib"
          copy /Y "%VCPKG%\lib\freetype.lib" "%VCPKG%\lib\freetype2ST.lib"
          if exist "%VCPKG%\lib\pthreadVC3.lib" copy /Y "%VCPKG%\lib\pthreadVC3.lib" "%VCPKG%\lib\pthreadVC2.lib"

      - name: Configure
        shell: cmd
        run: |
          if not exist build mkdir build
          cd build
cmake ../Editor ^
            -G "Visual Studio 17 2022" ^
            -A x64 ^
            -DLIBDIR=%GITHUB_WORKSPACE%/lib/win64_vc15 ^
            -DWITH_WINDOWS_FIND_MODULES=ON ^
            -DPYTHON_VERSION=3.10 ^
            -DPYTHON_INCLUDE_DIR=C:/vcpkg/installed/x64-windows/include/python3.10 ^
            -DPYTHON_LIBRARY=C:/vcpkg/installed/x64-windows/lib/python310.lib ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DWITH_PLAYER=OFF ^
            -DWITH_PYTHON_INSTALL_NUMPY=OFF ^
            -DWITH_PYTHON_INSTALL_REQUESTS=OFF ^
            -DWITH_CYCLES=OFF ^
            -DWITH_OPENCOLORIO=OFF ^
            -DWITH_OPENSUBDIV=OFF ^
            -DWITH_CODEC_FFMPEG=OFF ^
            -DWITH_OPENCOLLADA=OFF ^
            -DWITH_ALEMBIC=OFF ^
            -DWITH_JACK=OFF ^
            -DWITH_SDL=OFF ^
            -DWITH_FFTW3=OFF ^
            -DWITH_MOD_OCEANSIM=OFF ^
            -DWITH_CYCLES_OSL=OFF ^
            -DWITH_LLVM=OFF ^
            -DWITH_OPENVDB=OFF ^
            -DWITH_INTERNATIONAL=OFF

      - name: Build
        shell: cmd
        run: cd build && cmake --build . --config Release --parallel %NUMBER_OF_PROCESSORS%

      - name: Install
        shell: cmd
        run: cd build && cmake --install . --config Release --prefix install

      - name: Package
        shell: cmd
        run: cd install && 7z a -tzip ../gnuchaneditor-windows-x64.zip *

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: gnuchaneditor-windows-x64
          path: gnuchaneditor-windows-x64.zip
          retention-days: 15

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: gnuchaneditor-linux-x64

      - uses: actions/download-artifact@v4
        with:
          name: gnuchaneditor-windows-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "GnuChan Editor ${{ github.ref_name }}"
          files: |
            gnuchaneditor-linux-x64.tar.gz
            gnuchaneditor-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
