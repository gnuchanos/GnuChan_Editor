name: GnuChan Editor CI/CD

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  SOURCE_DIR: ${{ github.workspace }}/Editor
  BUILD_DIR: ${{ github.workspace }}/build
  INSTALL_DIR: ${{ github.workspace }}/install

jobs:
  build-linux:
    name: "Linux (GCC)"
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq --no-install-recommends build-essential cmake git python3-dev python3-pip python3-numpy python3-requests libx11-dev libxi-dev libxrandr-dev libxinerama-dev libxcursor-dev libgl1-mesa-dev libglu1-mesa-dev libfreetype-dev libjpeg-dev libpng-dev zlib1g-dev libopenal-dev libsndfile1-dev libboost-dev libboost-system-dev libboost-filesystem-dev libboost-thread-dev libboost-regex-dev libboost-locale-dev

      - name: Configure
        run: |
          mkdir -p ${{ env.BUILD_DIR }}
          cd ${{ env.BUILD_DIR }}
          cmake ${{ env.SOURCE_DIR }} -DPYTHON_VERSION=3.10 -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DCMAKE_INSTALL_PREFIX=${{ env.INSTALL_DIR }} -DWITH_PLAYER=OFF -DWITH_SYSTEM_GLEW=OFF -DWITH_CYCLES=OFF -DWITH_IMAGE_OPENEXR=OFF -DWITH_CODEC_FFMPEG=OFF -DWITH_OPENCOLLADA=OFF -DWITH_ALEMBIC=OFF -DWITH_JACK=OFF -DWITH_SDL=OFF -DWITH_FFTW3=OFF -DWITH_IK_ITASC=OFF -DWITH_MOD_FLUID=OFF -DWITH_MOD_OCEANSIM=OFF -DWITH_CYCLES_OSL=OFF -DWITH_LLVM=OFF -DWITH_OPENVDB=OFF -DWITH_OPENCOLORIO=OFF -DWITH_OPENSUBDIV=OFF -DWITH_INTERNATIONAL=OFF

      - name: Build
        run: cd ${{ env.BUILD_DIR }} && cmake --build . --config ${{ env.BUILD_TYPE }} --parallel $(nproc)

      - name: Install
        run: cd ${{ env.BUILD_DIR }} && cmake --install . --config ${{ env.BUILD_TYPE }}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: gnuchaneditor-linux-x64
          path: ${{ env.INSTALL_DIR }}
          retention-days: 15

  build-windows:
    name: "Windows (MSVC 2022)"
    runs-on: windows-2022
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/installed
            C:/vcpkg/buildtrees
          key: vcpkg-win64-${{ hashFiles('.github/workflows/build.yml') }}-v3

      - name: Setup vcpkg
        run: |
          if (-not (Test-Path "C:\vcpkg")) { git clone --depth=1 https://github.com/Microsoft/vcpkg.git C:\vcpkg ; C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics }
          C:\vcpkg\vcpkg.exe install --triplet x64-windows zlib libpng libjpeg-turbo freetype glew pthreads openal-soft python3
        shell: pwsh

      - name: Link libs
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\lib\win64_vc15"
          cmd /c mklink /J "${{ github.workspace }}\lib\win64_vc15\include" "C:\vcpkg\installed\x64-windows\include"
          cmd /c mklink /J "${{ github.workspace }}\lib\win64_vc15\lib" "C:\vcpkg\installed\x64-windows\lib"
        shell: pwsh

      - name: Configure
        shell: cmd
        run: |
          if not exist "${{ env.BUILD_DIR }}" mkdir "${{ env.BUILD_DIR }}"
          cd ${{ env.BUILD_DIR }}
          cmake ${{ env.SOURCE_DIR }} ^
            -G "Visual Studio 17 2022" ^
            -A x64 ^
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake ^
            -DLIBDIR=${{ github.workspace }}/lib/win64_vc15 ^
            -DWITH_WINDOWS_FIND_MODULES=ON ^
            -DPYTHON_VERSION=3.10 ^
            -DPYTHON_INCLUDE_DIR=C:/vcpkg/installed/x64-windows/include/python3.10 ^
            -DPYTHON_LIBRARY=C:/vcpkg/installed/x64-windows/lib/python310.lib ^
            -DPYTHON_LIBPATH=C:/vcpkg/installed/x64-windows/lib ^
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} ^
            -DCMAKE_INSTALL_PREFIX=${{ env.INSTALL_DIR }} ^
            -DWITH_PLAYER=OFF ^
            -DWITH_CYCLES=OFF ^
            -DWITH_OPENCOLORIO=OFF ^
            -DWITH_OPENSUBDIV=OFF ^
            -DWITH_CODEC_FFMPEG=OFF ^
            -DWITH_OPENCOLLADA=OFF ^
            -DWITH_ALEMBIC=OFF ^
            -DWITH_JACK=OFF ^
            -DWITH_SDL=OFF ^
            -DWITH_FFTW3=OFF ^
            -DWITH_MOD_OCEANSIM=OFF ^
            -DWITH_CYCLES_OSL=OFF ^
            -DWITH_LLVM=OFF ^
            -DWITH_OPENVDB=OFF ^
            -DWITH_INTERNATIONAL=OFF

      - name: Build
        shell: cmd
        run: cd ${{ env.BUILD_DIR }} && cmake --build . --config ${{ env.BUILD_TYPE }} --parallel %NUMBER_OF_PROCESSORS%

      - name: Install
        shell: cmd
        run: cd ${{ env.BUILD_DIR }} && cmake --install . --config ${{ env.BUILD_TYPE }}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: gnuchaneditor-windows-x64
          path: ${{ env.INSTALL_DIR }}
          retention-days: 15

  create-release:
    name: "Create Release"
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: gnuchaneditor-linux-x64
          path: release/linux

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: gnuchaneditor-windows-x64
          path: release/windows

      - name: Package Linux
        run: cd release/linux && tar -czf ../gnuchaneditor-${{ github.ref_name }}-linux-x64.tar.gz *

      - name: Package Windows
        run: cd release/windows && 7z a -tzip ../gnuchaneditor-${{ github.ref_name }}-windows-x64.zip *

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "GnuChan Editor ${{ github.ref_name }}"
          files: |
            release/gnuchaneditor-${{ github.ref_name }}-linux-x64.tar.gz
            release/gnuchaneditor-${{ github.ref_name }}-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
